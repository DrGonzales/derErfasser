<!DOCTYPE html>

<html lang="de">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<head>
    <meta charset="UTF-8">
    <title>IndexedDB Bildtest</title>
</head>

<body>

    <h2>Neues Objekt</h2>

    <input id="id" placeholder="ID"><br><br> <input id="name" placeholder="Name"><br><br>

    <input type="file" id="image" accept="image/*"><br><br>

    <button onclick="saveObject()">Speichern</button>

    <hr>

    <div id="list"></div>

    <script>

        async function databaseStats() {

            const tx =
                db.transaction(
                    "objects",
                    "readonly"
                );

            const req =
                tx.objectStore("objects")
                    .getAll();

            req.onsuccess = () => {

                let imageCount = 0;

                req.result.forEach(obj => {

                    if (obj.imageBlob) {
                        imageCount++;
                    }
                });

                console.log(
                    "Objekte:",
                    req.result.length
                );

                console.log(
                    "Bilder:",
                    imageCount
                );
            };
        }
        async function showStorageStatus() {

            if (!navigator.storage?.estimate) {
                console.log("Nicht unterstützt");
                return;
            }

            const estimate =
                await navigator.storage.estimate();

            const usedMB =
                (estimate.usage / 1024 / 1024)
                    .toFixed(2);

            const quotaMB =
                (estimate.quota / 1024 / 1024)
                    .toFixed(2);

            const percent =
                ((estimate.usage /
                    estimate.quota) * 100)
                    .toFixed(1);

            console.log(
                `Belegt: ${usedMB} MB`
            );

            console.log(
                `Verfügbar: ${quotaMB} MB`
            );

            console.log(
                `${percent}% genutzt`
            );
        }

        let db;

        const req = indexedDB.open("demoDB", 1);

        req.onupgradeneeded = (e) => {
            db = e.target.result;

            db.createObjectStore("objects", {
                keyPath: "id"
            });
        };

        req.onsuccess = (e) => {
            db = e.target.result;
            loadObjects();
        };

        function saveObject() {

            const id =
                document.getElementById("id").value;

            const name =
                document.getElementById("name").value;

            const file =
                document.getElementById("image").files[0];

            const tx =
                db.transaction("objects", "readwrite");

            tx.objectStore("objects").put({
                id,
                name,
                imageBlob: file
            });

            tx.oncomplete = () => {
                loadObjects();
            };
        }

        function loadObjects() {

            const tx =
                db.transaction("objects", "readonly");

            const req =
                tx.objectStore("objects").getAll();

            req.onsuccess = () => {

                const list =
                    document.getElementById("list");

                list.innerHTML = "";

                req.result.forEach(obj => {

                    const div =
                        document.createElement("div");

                    div.style.border =
                        "1px solid #ccc";

                    div.style.margin =
                        "10px";

                    div.style.padding =
                        "10px";

                    div.innerHTML =
                        "<b>" + obj.id + "</b><br>" +
                        obj.name + "<br>";

                    if (obj.imageBlob) {

                        const img =
                            document.createElement("img");

                        img.width = 200;

                        img.src =
                            URL.createObjectURL(
                                obj.imageBlob
                            );

                        div.appendChild(img);
                    }

                    list.appendChild(div);
                });
            };
        }


        async function backupZip() {

            const tx =
                db.transaction(
                    "objects",
                    "readonly"
                );

            const req =
                tx.objectStore("objects")
                    .getAll();

            req.onsuccess = async () => {

                const objects =
                    req.result;

                const zip =
                    new JSZip();

                const jsonObjects = [];

                const photoFolder =
                    zip.folder("photos");

                for (const obj of objects) {

                    const exportObj = {
                        id: obj.id,
                        name: obj.name,
                        imageFile: null
                    };

                    if (obj.imageBlob) {

                        const filename =
                            `${obj.id}.jpg`;

                        photoFolder.file(
                            filename,
                            obj.imageBlob
                        );

                        exportObj.imageFile =
                            filename;
                    }

                    jsonObjects.push(
                        exportObj
                    );
                }

                zip.file(
                    "data.json",
                    JSON.stringify(
                        {
                            exportDate:
                                new Date()
                                    .toISOString(),
                            objects:
                                jsonObjects
                        },
                        null,
                        2
                    )
                );

                const content =
                    await zip.generateAsync({
                        type: "blob"
                    });

                const link =
                    document.createElement("a");

                link.href =
                    URL.createObjectURL(
                        content
                    );

                link.download =
                    "inventar-backup.zip";

                link.click();
            };
        }

    </script>
    <button onclick="backupZip()">
        Backup ZIP
    </button>
</body>

</html>
